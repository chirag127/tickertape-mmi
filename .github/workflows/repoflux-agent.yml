
name: RepoFlux — AI Coding Agent

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'RepoFlux Run ID'
        required: true
        type: string
      prompt:
        description: 'The task for the AI agent'
        required: true
        type: string
      agent_type:
        description: 'Which agent to use (gemini, aider, opencode, crush, qwen, goose, claude-code, codex, aider-ollama)'
        required: false
        default: 'gemini'
        type: string
      state_repo:
        description: 'The state repository name'
        required: true
        type: string
      branch:
        description: 'Branch to run on'
        required: false
        default: 'main'
        type: string
      openrouter_model:
        description: 'Model for OpenRouter agents'
        required: false
        default: 'meta-llama/llama-4-scout:free'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate Global Context and MCP Configurations
        run: |
          mkdir -p .gemini .opencode .qwen .claude
          
          # --- Global Context (GEMINI.md) ---
          cat << 'GEMINIMD_EOF' > GEMINI.md
          # Project Instructions
          - **Environment:** You are running in an automated CI/CD GitHub Actions environment.
          - **Focus:** Always output functional and production-ready code.
          - **Constraints:** Do not use interactive shell commands. Assume `--yolo` approval mode.
          GEMINIMD_EOF
          
          # --- Exclusions (.geminiignore) ---
          cat << 'GEMINIIGNORE_EOF' > .geminiignore
          node_modules/
          dist/
          build/
          .git/
          .env
          GEMINIIGNORE_EOF

          # --- gemini (.gemini/settings.json) ---
          cat << 'GEMINI_EOF' > .gemini/settings.json
{
  "general": {
    "checkpointing": {
      "enabled": true
    }
  },
  "tools": {
    "approvalMode": "yolo"
  },
  "mcpServers": {
    "context7": {
      "httpUrl": "https://mcp.context7.com/mcp",
      "headers": {
        "CONTEXT7_API_KEY": "${{ secrets.CONTEXT7_API_KEY }}"
      }
    },
    "ref": {
      "httpUrl": "https://api.ref.tools/mcp",
      "headers": {
        "x-ref-api-key": "${{ secrets.REF_API_KEY }}"
      }
    },
    "docfork": {
      "command": "npx",
      "args": [
        "-y",
        "docfork"
      ]
    },
    "exa": {
      "httpUrl": "https://mcp.exa.ai/mcp"
    },
    "linkup": {
      "httpUrl": "https://mcp.linkup.so/mcp?apiKey=${{ secrets.LINKUP_API_KEY }}"
    },
    "kindly-web-search": {
      "command": "uvx",
      "args": [
        "--from",
        "git+https://github.com/Shelpuk-AI-Technology-Consulting/kindly-web-search-mcp-server",
        "kindly-web-search-mcp-server",
        "start-mcp-server"
      ],
      "env": {
        "SERPER_API_KEY": "${{ secrets.SERPER_API_KEY }}",
        "TAVILY_API_KEY": "${{ secrets.TAVILY_API_KEY }}",
        "KINDLY_BROWSER_EXECUTABLE_PATH": "/usr/bin/google-chrome-stable"
      }
    },
    "sequential-thinking": {
      "command": "npx",
      "args": [
        "-y",
        "@modelcontextprotocol/server-sequential-thinking"
      ]
    },
    "filesystem": {
      "command": "npx",
      "args": [
        "-y",
        "@modelcontextprotocol/server-filesystem",
        "/github/workspace"
      ]
    },
    "github": {
      "command": "npx",
      "args": [
        "-y",
        "@modelcontextprotocol/server-github"
      ],
      "env": {
        "GITHUB_TOKEN": "${{ secrets.GITHUB_TOKEN }}"
      }
    },
    "memory": {
      "command": "npx",
      "args": [
        "-y",
        "@modelcontextprotocol/server-memory"
      ]
    },
    "fetch": {
      "command": "npx",
      "args": [
        "-y",
        "@modelcontextprotocol/server-fetch"
      ]
    }
  }
}
