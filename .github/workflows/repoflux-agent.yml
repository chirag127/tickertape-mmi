[mcp.servers.context7]
url = "https://mcp.context7.com/mcp"

[mcp.servers.context7.headers]
CONTEXT7_API_KEY = "${{ secrets.CONTEXT7_API_KEY }}"

[mcp.servers.ref]
url = "https://api.ref.tools/mcp"

[mcp.servers.ref.headers]
x-ref-api-key = "${{ secrets.REF_API_KEY }}"

[mcp.servers.docfork]
command = "npx"
args = ["-y", "docfork"]

[mcp.servers.exa]
url = "https://mcp.exa.ai/mcp"

[mcp.servers.linkup]
url = "https://mcp.linkup.so/mcp?apiKey=${{ secrets.LINKUP_API_KEY }}"

[mcp.servers.kindly-web-search]
command = "uvx"
args = ["--from", "git+https://github.com/Shelpuk-AI-Technology-Consulting/kindly-web-search-mcp-server", "kindly-web-search-mcp-server", "start-mcp-server"]

[mcp.servers.kindly-web-search.env]
SERPER_API_KEY = "${{ secrets.SERPER_API_KEY }}"
TAVILY_API_KEY = "${{ secrets.TAVILY_API_KEY }}"
KINDLY_BROWSER_EXECUTABLE_PATH = "/usr/bin/google-chrome-stable"

[mcp.servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp.servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/github/workspace"]

[mcp.servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]

[mcp.servers.github.env]
GITHUB_TOKEN = "${{ secrets.GITHUB_TOKEN }}"

[mcp.servers.memory]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]

[mcp.servers.fetch]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-fetch"]

          CRUSH_EOF

          
      - name: Run Gemini CLI
        if: inputs.agent_type == 'gemini'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          npm install -g @google/gemini-cli@latest
          gemini -p "${{ inputs.prompt }}" --approval-mode=yolo

      - name: Run Qwen Code
        if: inputs.agent_type == 'qwen'
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: |
          npm install -g qwen-code
          qwen -p "${{ inputs.prompt }}" --yolo

      - name: Run OpenCode
        if: inputs.agent_type == 'opencode'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          curl -fsSL https://opencode.ai/install | bash
          opencode -p "${{ inputs.prompt }}" -f json -q

      - name: Run Claude Code (via OpenRouter)
        if: inputs.agent_type == 'claude-code'
        env:
          ANTHROPIC_BASE_URL: https://openrouter.ai/api
          ANTHROPIC_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_MODEL: ${{ inputs.openrouter_model }}
        run: |
          npm install -g @anthropic-ai/claude-code
          claude -p "${{ inputs.prompt }}" --allowedTools "Read,Write,Edit,Bash"

      - name: Run Aider
        if: inputs.agent_type == 'aider'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          pip install aider-chat --break-system-packages
          aider --model gemini/gemini-2.5-pro --message "${{ inputs.prompt }}" --yes --no-git

      - name: Commit and Push Changes
        run: |
          git config --global user.name "repoflux-agent[bot]"
          git config --global user.email "repoflux-agent[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-generated by RepoFlux (${{ inputs.agent_type }})"
            git push origin ${{ inputs.branch }}
          fi
